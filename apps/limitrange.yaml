apiVersion: v1
kind: LimitRange
metadata:
  name: apps-limit-range
  namespace: apps
spec:
  limits:
  - type: Container
    default:
      cpu: "500m"
      memory: "256Mi"
    defaultRequest:
      cpu: "100m"
      memory: "64Mi"
    max:
      cpu: "2"
      memory: "1Gi"
    min:
      cpu: "50m"
      memory: "32Mi"
  - type: Pod
    max:
      cpu: "4"
      memory: "2Gi"
