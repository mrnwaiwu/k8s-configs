apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-api
  namespace: mrnwaiwu-apps
  labels:
    app: weather-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weather-api
  template:
    metadata:
      labels:
        app: weather-api
    spec:
      containers:
        - name: weather-api
          image: mrnwaiwu/weather-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: weather-api-config
            - secretRef:
                name: weather-api-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
